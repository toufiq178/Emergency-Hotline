<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- tailwind and daisy ui connect -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>


    <header>
        <nav class="   bg-base-100 shadow-sm">
            <div class="navbar max-w-11/12 mx-auto px-4 flex justify-between">


                <div class="flex items-center gap-3">
                    <img src="./assets/logo.png" class="w-10 h-10" alt="">
                    <h1 class="font-bold text-lg text-green-700 leading-5">
                        Emergency <br> Service
                    </h1>
                </div>


                <div class=" flex items-center gap-4">

                    <!-- Heart -->
                    <div class="flex items-center gap-2 bg-green-100 px-4 py-1 rounded-full">
                        <span>0</span>
                        <span>❤️</span>
                    </div>

                    <!-- Coin -->
                    <div class="flex items-center gap-2 bg-green-100 px-4 py-1 rounded-full">
                        <span>100</span>
                        <span>🪙</span>
                    </div>

                    <!-- Copy Button -->
                    <button class="btn btn-success rounded-full px-5 text-white">
                        2 Copy
                    </button>

                </div>

            </div>
        </nav>


        <!-- hero section -->
        <section class="bg-[linear-gradient(to_right,#013223,#006747,#013223)] text-white py-10">

            <div class="max-w-5xl mx-auto text-center space-y-4">

                <!-- Logo -->
                <div class="flex justify-center">
                    <img src="./assets/logo-dark.png" class="w-16 h-16" alt="gov logo">
                </div>

                <!-- Title -->
                <h1 class="text-3xl md:text-4xl font-bold">
                    জরুরি সেবা ডিরেক্টরি
                </h1>

                <!-- Subtitle -->
                <p class="text-sm md:text-base text-gray-200 font-semibold">
                    Government Emergency Services at Your Fingertip –
                    A Project by Government of the People's Republic of Bangladesh
                </p>

            </div>

        </section>
    </header>

</body>

</html>
