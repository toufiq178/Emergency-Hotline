<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- tailwind and daisy ui connect -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>


    <header>
        <nav class="   bg-base-100 shadow-sm">
            <div class="navbar max-w-11/12 mx-auto px-4 flex justify-between">

                
                <div class="flex items-center gap-3">
                    <img src="./assets/logo.png" class="w-10 h-10" alt="">
                    <h1 class="font-bold text-lg text-green-700 leading-5">
                        Emergency <br> Service
                    </h1>
                </div>

                
                <div class=" flex items-center gap-4">

                    <!-- Heart -->
                    <div class="flex items-center gap-2 bg-green-100 px-4 py-1 rounded-full">
                        <span>0</span>
                        <span>❤️</span>
                    </div>

                    <!-- Coin -->
                    <div class="flex items-center gap-2 bg-green-100 px-4 py-1 rounded-full">
                        <span>100</span>
                        <span>🪙</span>
                    </div>

                    <!-- Copy Button -->
                    <button class="btn btn-success rounded-full px-5 text-white">
                        2 Copy
                    </button>

                </div>

            </div>
        </nav>
    </header>

</body>

</html>
